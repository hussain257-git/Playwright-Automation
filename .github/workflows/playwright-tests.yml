name: Playwright Tests CI/CD Pipeline

on:
  push:
    branches: [ main, develop, feature/* ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run tests daily at 02:00 UTC
    - cron: '0 2 * * *'

jobs:
  test:
    name: Run Playwright Tests
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test
        env:
          CI: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload test videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-videos
          path: test-results/
          retention-days: 7

      - name: Publish test results
        if: always()
        continue-on-error: true
        uses: EnricoMi/publish-unit-test-result-action/composite@v2
        with:
          files: test-results/results.xml
          check_name: Playwright Test Results
          comment_title: Test Results

      - name: Generate test summary
        if: always()
        run: |
          echo "## Test Execution Summary" >> $env:GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $env:GITHUB_STEP_SUMMARY
          echo "- **Triggered By**: ${{ github.actor }}" >> $env:GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $env:GITHUB_STEP_SUMMARY
          echo "- **View Report**: Download the playwright-report artifact above" >> $env:GITHUB_STEP_SUMMARY

      - name: Send email on success
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp-mail.outlook.com
          server_port: 587
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "✅ Playwright Tests PASSED - Run #${{ github.run_number }} (${{ github.ref_name }})"
          to: HussainBasha.Shaik257@outlook.com
          from: ${{ secrets.EMAIL_USERNAME }}
          body: |
            ✅ All Playwright tests PASSED

            Run #${{ github.run_number }} on branch: ${{ github.ref_name }}
            Triggered by: ${{ github.actor }}
            Commit: ${{ github.sha }}

            View run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            Download report: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }} (playwright-report artifact)

      - name: Send email on failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp-mail.outlook.com
          server_port: 587
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "❌ Playwright Tests FAILED - Run #${{ github.run_number }} (${{ github.ref_name }})"
          to: HussainBasha.Shaik257@outlook.com
          from: ${{ secrets.EMAIL_USERNAME }}
          body: |
            ❌ Playwright tests FAILED

            Run #${{ github.run_number }} on branch: ${{ github.ref_name }}
            Triggered by: ${{ github.actor }}
            Commit: ${{ github.sha }}

            View logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

