name: Playwright Tests CI/CD Pipeline

on:
  push:
    branches: [ main, develop, feature/* ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 0 * * *'   # 12:00 AM UTC
    - cron: '0 6 * * *'   # 06:00 AM UTC
    - cron: '0 12 * * *'  # 12:00 PM UTC
    - cron: '0 18 * * *'  # 06:00 PM UTC

jobs:
  test:
    name: Run Playwright Tests
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # continue-on-error so email steps always run regardless of test outcome
      - name: Run Playwright tests
        id: run_tests
        run: npx playwright test
        env:
          CI: true
        continue-on-error: true

      # Parse test-results.json into step outputs for email metrics
      - name: Parse test results
        if: always()
        id: parse
        run: |
          $passed=0; $failed=0; $skipped=0; $flaky=0; $total=0
          $duration="N/A"; $passRate="N/A"
          if (Test-Path "test-results.json") {
            try {
              $j = Get-Content "test-results.json" -Raw | ConvertFrom-Json
              $passed  = [int]$j.stats.expected
              $failed  = [int]$j.stats.unexpected
              $skipped = [int]$j.stats.skipped
              $flaky   = if ($j.stats.PSObject.Properties['flaky']) { [int]$j.stats.flaky } else { 0 }
              $total   = $passed + $failed + $skipped + $flaky
              $sec     = [math]::Round($j.stats.duration / 1000, 1)
              $duration = "${sec}s"
              $passRate = if ($total -gt 0) { "$([math]::Round($passed/$total*100,1))%" } else { "0%" }
            } catch { Write-Warning "Parse error: $_" }
          }
          "passed=$passed"      >> $env:GITHUB_OUTPUT
          "failed=$failed"      >> $env:GITHUB_OUTPUT
          "skipped=$skipped"    >> $env:GITHUB_OUTPUT
          "flaky=$flaky"        >> $env:GITHUB_OUTPUT
          "total=$total"        >> $env:GITHUB_OUTPUT
          "duration=$duration"  >> $env:GITHUB_OUTPUT
          "pass_rate=$passRate" >> $env:GITHUB_OUTPUT
          Write-Host "Results => Total:$total Passed:$passed Failed:$failed Skipped:$skipped Flaky:$flaky Rate:$passRate Duration:$duration"

      # Zip report folder for email attachment
      - name: Zip Playwright report
        if: always()
        continue-on-error: true
        run: |
          if (Test-Path "playwright-report") {
            Compress-Archive -Path "playwright-report\*" -DestinationPath "playwright-report.zip" -Force
          } else {
            New-Item -ItemType File -Path "playwright-report.zip" -Force | Out-Null
          }

      - name: Upload HTML report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload test videos artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-videos
          path: test-results/
          retention-days: 7
          if-no-files-found: ignore

      - name: Publish test results
        if: always()
        continue-on-error: true
        uses: EnricoMi/publish-unit-test-result-action/composite@v2
        with:
          files: test-results/results.xml
          check_name: Playwright Test Results
          comment_title: Test Results

      - name: Generate job summary
        if: always()
        run: |
          $s = if ("${{ steps.run_tests.outcome }}" -eq "success") { "PASSED" } else { "FAILED" }
          "## Playwright Tests - $s (Run #${{ github.run_number }})" >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY
          "| Metric | Value |" >> $env:GITHUB_STEP_SUMMARY
          "|--------|-------|" >> $env:GITHUB_STEP_SUMMARY
          "| Total Tests | ${{ steps.parse.outputs.total }} |" >> $env:GITHUB_STEP_SUMMARY
          "| Passed | ${{ steps.parse.outputs.passed }} |" >> $env:GITHUB_STEP_SUMMARY
          "| Failed | ${{ steps.parse.outputs.failed }} |" >> $env:GITHUB_STEP_SUMMARY
          "| Flaky/Broken | ${{ steps.parse.outputs.flaky }} |" >> $env:GITHUB_STEP_SUMMARY
          "| Skipped | ${{ steps.parse.outputs.skipped }} |" >> $env:GITHUB_STEP_SUMMARY
          "| Pass Rate | ${{ steps.parse.outputs.pass_rate }} |" >> $env:GITHUB_STEP_SUMMARY
          "| Duration | ${{ steps.parse.outputs.duration }} |" >> $env:GITHUB_STEP_SUMMARY

      # SUCCESS EMAIL
      - name: Send success email
        if: steps.run_tests.outcome == 'success'
        continue-on-error: true
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp-mail.outlook.com
          server_port: 587
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "[PASSED] Playwright CI | Run #${{ github.run_number }} | ${{ github.ref_name }} | ${{ steps.parse.outputs.passed }}/${{ steps.parse.outputs.total }} (${{ steps.parse.outputs.pass_rate }})"
          to: HussainBasha.Shaik257@outlook.com
          from: ${{ secrets.EMAIL_USERNAME }}
          attachments: playwright-report.zip
          html_body: |
            <html><body style="font-family:Arial,sans-serif;background:#f5f5f5;padding:0;margin:0">
            <div style="max-width:680px;margin:30px auto;background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 4px 15px rgba(0,0,0,0.1)">
              <div style="background:linear-gradient(135deg,#2da44e,#1a7f37);padding:30px;text-align:center">
                <h1 style="color:#fff;margin:0 0 5px;font-size:28px">&#x2705; All Tests Passed!</h1>
                <p style="color:#acf0b5;margin:0;font-size:14px">Playwright CI/CD Pipeline &#8212; Run #${{ github.run_number }}</p>
              </div>
              <div style="padding:30px">
                <h2 style="color:#1f2328;font-size:18px;margin:0 0 16px;padding-bottom:8px;border-bottom:2px solid #2da44e">&#x1F4CA; Result Summary</h2>
                <table style="width:100%;border-collapse:collapse;margin-bottom:28px">
                  <thead><tr style="background:#f6f8fa">
                    <th style="padding:12px 16px;text-align:left;border:1px solid #d0d7de;color:#656d76">Metric</th>
                    <th style="padding:12px 16px;text-align:center;border:1px solid #d0d7de;color:#656d76">Value</th>
                  </tr></thead>
                  <tbody>
                    <tr><td style="padding:11px 16px;border:1px solid #d0d7de;font-weight:600">Total Executed</td><td style="padding:11px 16px;text-align:center;border:1px solid #d0d7de;font-weight:700;font-size:16px">${{ steps.parse.outputs.total }}</td></tr>
                    <tr style="background:#dafbe1"><td style="padding:11px 16px;border:1px solid #d0d7de">&#x2705; Passed</td><td style="padding:11px 16px;text-align:center;border:1px solid #d0d7de;color:#1a7f37;font-weight:700;font-size:16px">${{ steps.parse.outputs.passed }}</td></tr>
                    <tr><td style="padding:11px 16px;border:1px solid #d0d7de">&#x274C; Failed</td><td style="padding:11px 16px;text-align:center;border:1px solid #d0d7de;color:#cf222e;font-weight:700">${{ steps.parse.outputs.failed }}</td></tr>
                    <tr style="background:#f6f8fa"><td style="padding:11px 16px;border:1px solid #d0d7de">&#x26A0;&#xFE0F; Broken / Flaky</td><td style="padding:11px 16px;text-align:center;border:1px solid #d0d7de;color:#9a6700;font-weight:700">${{ steps.parse.outputs.flaky }}</td></tr>
                    <tr><td style="padding:11px 16px;border:1px solid #d0d7de">&#x23ED;&#xFE0F; Skipped</td><td style="padding:11px 16px;text-align:center;border:1px solid #d0d7de;color:#656d76;font-weight:700">${{ steps.parse.outputs.skipped }}</td></tr>
                    <tr style="background:#dafbe1"><td style="padding:11px 16px;border:1px solid #d0d7de;font-weight:600">&#x1F4CA; Pass Rate</td><td style="padding:11px 16px;text-align:center;border:1px solid #d0d7de;color:#1a7f37;font-weight:700;font-size:22px">${{ steps.parse.outputs.pass_rate }}</td></tr>
                    <tr style="background:#f6f8fa"><td style="padding:11px 16px;border:1px solid #d0d7de">&#x23F1;&#xFE0F; Duration</td><td style="padding:11px 16px;text-align:center;border:1px solid #d0d7de">${{ steps.parse.outputs.duration }}</td></tr>
                  </tbody>
                </table>
                <h2 style="color:#1f2328;font-size:18px;margin:0 0 16px;padding-bottom:8px;border-bottom:2px solid #e6e8eb">&#x1F50D; Run Details</h2>
                <table style="width:100%;border-collapse:collapse;margin-bottom:28px">
                  <tr><td style="padding:9px 16px;color:#656d76;width:40%">Repository</td><td style="padding:9px 16px;font-weight:600">${{ github.repository }}</td></tr>
                  <tr style="background:#f6f8fa"><td style="padding:9px 16px;color:#656d76">Branch</td><td style="padding:9px 16px;font-weight:600">${{ github.ref_name }}</td></tr>
                  <tr><td style="padding:9px 16px;color:#656d76">Triggered By</td><td style="padding:9px 16px;font-weight:600">${{ github.actor }}</td></tr>
                  <tr style="background:#f6f8fa"><td style="padding:9px 16px;color:#656d76">Trigger Event</td><td style="padding:9px 16px;font-weight:600">${{ github.event_name }}</td></tr>
                  <tr><td style="padding:9px 16px;color:#656d76">Run Number</td><td style="padding:9px 16px;font-weight:600">#${{ github.run_number }}</td></tr>
                  <tr style="background:#f6f8fa"><td style="padding:9px 16px;color:#656d76">Commit SHA</td><td style="padding:9px 16px;font-family:monospace;font-size:12px">${{ github.sha }}</td></tr>
                  <tr><td style="padding:9px 16px;color:#656d76">Browser</td><td style="padding:9px 16px;font-weight:600">Chromium (Playwright)</td></tr>
                  <tr style="background:#f6f8fa"><td style="padding:9px 16px;color:#656d76">OS / Runner</td><td style="padding:9px 16px;font-weight:600">Windows Latest</td></tr>
                </table>
                <h2 style="color:#1f2328;font-size:18px;margin:0 0 16px;padding-bottom:8px;border-bottom:2px solid #e6e8eb">&#x1F4C1; Test Suites</h2>
                <table style="width:100%;border-collapse:collapse;margin-bottom:28px">
                  <thead><tr style="background:#f6f8fa">
                    <th style="padding:10px 16px;text-align:left;border:1px solid #d0d7de;color:#656d76">Suite</th>
                    <th style="padding:10px 16px;text-align:left;border:1px solid #d0d7de;color:#656d76">Test IDs</th>
                    <th style="padding:10px 16px;text-align:center;border:1px solid #d0d7de;color:#656d76">Status</th>
                  </tr></thead>
                  <tbody>
                    <tr><td style="padding:9px 16px;border:1px solid #d0d7de">Login Functionality</td><td style="padding:9px 16px;border:1px solid #d0d7de;color:#656d76;font-size:13px">TC-001 to TC-005</td><td style="padding:9px 16px;text-align:center;border:1px solid #d0d7de;color:#1a7f37;font-weight:600">&#x2705; Passed</td></tr>
                    <tr style="background:#f6f8fa"><td style="padding:9px 16px;border:1px solid #d0d7de">Inventory / Products</td><td style="padding:9px 16px;border:1px solid #d0d7de;color:#656d76;font-size:13px">TC-006 to TC-009</td><td style="padding:9px 16px;text-align:center;border:1px solid #d0d7de;color:#1a7f37;font-weight:600">&#x2705; Passed</td></tr>
                    <tr><td style="padding:9px 16px;border:1px solid #d0d7de">Cart Validation</td><td style="padding:9px 16px;border:1px solid #d0d7de;color:#656d76;font-size:13px">TC-010 to TC-013</td><td style="padding:9px 16px;text-align:center;border:1px solid #d0d7de;color:#1a7f37;font-weight:600">&#x2705; Passed</td></tr>
                    <tr style="background:#f6f8fa"><td style="padding:9px 16px;border:1px solid #d0d7de">E2E Checkout Flow</td><td style="padding:9px 16px;border:1px solid #d0d7de;color:#656d76;font-size:13px">E2E-001 to E2E-003</td><td style="padding:9px 16px;text-align:center;border:1px solid #d0d7de;color:#1a7f37;font-weight:600">&#x2705; Passed</td></tr>
                    <tr><td style="padding:9px 16px;border:1px solid #d0d7de">Logout</td><td style="padding:9px 16px;border:1px solid #d0d7de;color:#656d76;font-size:13px">TC-014 to TC-015</td><td style="padding:9px 16px;text-align:center;border:1px solid #d0d7de;color:#1a7f37;font-weight:600">&#x2705; Passed</td></tr>
                    <tr style="background:#f6f8fa"><td style="padding:9px 16px;border:1px solid #d0d7de">UI/UX Validation</td><td style="padding:9px 16px;border:1px solid #d0d7de;color:#656d76;font-size:13px">TC-016 to TC-020</td><td style="padding:9px 16px;text-align:center;border:1px solid #d0d7de;color:#1a7f37;font-weight:600">&#x2705; Passed</td></tr>
                    <tr><td style="padding:9px 16px;border:1px solid #d0d7de">Negative Cases</td><td style="padding:9px 16px;border:1px solid #d0d7de;color:#656d76;font-size:13px">TC-021 to TC-024</td><td style="padding:9px 16px;text-align:center;border:1px solid #d0d7de;color:#1a7f37;font-weight:600">&#x2705; Passed</td></tr>
                  </tbody>
                </table>
                <div style="text-align:center;margin:20px 0 10px">
                  <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" style="display:inline-block;background:#2da44e;color:#fff;padding:13px 28px;text-decoration:none;border-radius:6px;font-weight:600;font-size:14px">View Full Run Logs &amp; Artifacts</a>
                </div>
                <p style="color:#999;font-size:12px;text-align:center;margin-top:16px">Playwright HTML report attached as playwright-report.zip</p>
              </div>
              <div style="background:#f6f8fa;padding:16px;text-align:center;border-top:1px solid #e6e8eb">
                <p style="color:#999;font-size:12px;margin:0">GitHub Actions &#8226; ${{ github.repository }} &#8226; Run #${{ github.run_number }}</p>
              </div>
            </div>
            </body></html>

      # FAILURE EMAIL
      - name: Send failure email
        if: steps.run_tests.outcome == 'failure'
        continue-on-error: true
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp-mail.outlook.com
          server_port: 587
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "[FAILED] Playwright CI | Run #${{ github.run_number }} | ${{ github.ref_name }} | ${{ steps.parse.outputs.failed }} failed / ${{ steps.parse.outputs.total }} total"
          to: HussainBasha.Shaik257@outlook.com
          from: ${{ secrets.EMAIL_USERNAME }}
          attachments: playwright-report.zip
          html_body: |
            <html><body style="font-family:Arial,sans-serif;background:#f5f5f5;padding:0;margin:0">
            <div style="max-width:680px;margin:30px auto;background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 4px 15px rgba(0,0,0,0.1)">
              <div style="background:linear-gradient(135deg,#d1242f,#a40e26);padding:30px;text-align:center">
                <h1 style="color:#fff;margin:0 0 5px;font-size:28px">&#x274C; Tests Failed!</h1>
                <p style="color:#ffd4d4;margin:0;font-size:14px">Playwright CI/CD Pipeline &#8212; Run #${{ github.run_number }}</p>
              </div>
              <div style="padding:30px">
                <h2 style="color:#1f2328;font-size:18px;margin:0 0 16px;padding-bottom:8px;border-bottom:2px solid #d1242f">&#x1F4CA; Result Summary</h2>
                <table style="width:100%;border-collapse:collapse;margin-bottom:28px">
                  <thead><tr style="background:#f6f8fa">
                    <th style="padding:12px 16px;text-align:left;border:1px solid #d0d7de;color:#656d76">Metric</th>
                    <th style="padding:12px 16px;text-align:center;border:1px solid #d0d7de;color:#656d76">Value</th>
                  </tr></thead>
                  <tbody>
                    <tr><td style="padding:11px 16px;border:1px solid #d0d7de;font-weight:600">Total Executed</td><td style="padding:11px 16px;text-align:center;border:1px solid #d0d7de;font-weight:700;font-size:16px">${{ steps.parse.outputs.total }}</td></tr>
                    <tr style="background:#dafbe1"><td style="padding:11px 16px;border:1px solid #d0d7de">&#x2705; Passed</td><td style="padding:11px 16px;text-align:center;border:1px solid #d0d7de;color:#1a7f37;font-weight:700;font-size:16px">${{ steps.parse.outputs.passed }}</td></tr>
                    <tr style="background:#ffebe9"><td style="padding:11px 16px;border:1px solid #d0d7de">&#x274C; Failed</td><td style="padding:11px 16px;text-align:center;border:1px solid #d0d7de;color:#cf222e;font-weight:700;font-size:16px">${{ steps.parse.outputs.failed }}</td></tr>
                    <tr style="background:#f6f8fa"><td style="padding:11px 16px;border:1px solid #d0d7de">&#x26A0;&#xFE0F; Broken / Flaky</td><td style="padding:11px 16px;text-align:center;border:1px solid #d0d7de;color:#9a6700;font-weight:700">${{ steps.parse.outputs.flaky }}</td></tr>
                    <tr><td style="padding:11px 16px;border:1px solid #d0d7de">&#x23ED;&#xFE0F; Skipped</td><td style="padding:11px 16px;text-align:center;border:1px solid #d0d7de;color:#656d76;font-weight:700">${{ steps.parse.outputs.skipped }}</td></tr>
                    <tr style="background:#ffebe9"><td style="padding:11px 16px;border:1px solid #d0d7de;font-weight:600">&#x1F4CA; Pass Rate</td><td style="padding:11px 16px;text-align:center;border:1px solid #d0d7de;color:#cf222e;font-weight:700;font-size:22px">${{ steps.parse.outputs.pass_rate }}</td></tr>
                    <tr style="background:#f6f8fa"><td style="padding:11px 16px;border:1px solid #d0d7de">&#x23F1;&#xFE0F; Duration</td><td style="padding:11px 16px;text-align:center;border:1px solid #d0d7de">${{ steps.parse.outputs.duration }}</td></tr>
                  </tbody>
                </table>
                <h2 style="color:#1f2328;font-size:18px;margin:0 0 16px;padding-bottom:8px;border-bottom:2px solid #e6e8eb">&#x1F50D; Run Details</h2>
                <table style="width:100%;border-collapse:collapse;margin-bottom:28px">
                  <tr><td style="padding:9px 16px;color:#656d76;width:40%">Repository</td><td style="padding:9px 16px;font-weight:600">${{ github.repository }}</td></tr>
                  <tr style="background:#f6f8fa"><td style="padding:9px 16px;color:#656d76">Branch</td><td style="padding:9px 16px;font-weight:600">${{ github.ref_name }}</td></tr>
                  <tr><td style="padding:9px 16px;color:#656d76">Triggered By</td><td style="padding:9px 16px;font-weight:600">${{ github.actor }}</td></tr>
                  <tr style="background:#f6f8fa"><td style="padding:9px 16px;color:#656d76">Trigger Event</td><td style="padding:9px 16px;font-weight:600">${{ github.event_name }}</td></tr>
                  <tr><td style="padding:9px 16px;color:#656d76">Run Number</td><td style="padding:9px 16px;font-weight:600">#${{ github.run_number }}</td></tr>
                  <tr style="background:#f6f8fa"><td style="padding:9px 16px;color:#656d76">Commit SHA</td><td style="padding:9px 16px;font-family:monospace;font-size:12px">${{ github.sha }}</td></tr>
                  <tr><td style="padding:9px 16px;color:#656d76">Browser</td><td style="padding:9px 16px;font-weight:600">Chromium (Playwright)</td></tr>
                  <tr style="background:#f6f8fa"><td style="padding:9px 16px;color:#656d76">OS / Runner</td><td style="padding:9px 16px;font-weight:600">Windows Latest</td></tr>
                </table>
                <div style="background:#fff8c5;border:1px solid #d4a72c;border-radius:6px;padding:16px;margin-bottom:24px">
                  <h3 style="color:#9a6700;margin:0 0 8px;font-size:14px">&#x26A0;&#xFE0F; Action Required</h3>
                  <ol style="color:#9a6700;margin:0;padding-left:20px;font-size:13px">
                    <li>Review failure logs via the link below</li>
                    <li>Check screenshots/videos in test-videos artifact</li>
                    <li>Reproduce locally: npx playwright test</li>
                    <li>Debug: npx playwright test --debug</li>
                  </ol>
                </div>
                <div style="text-align:center;margin:20px 0 10px">
                  <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" style="display:inline-block;background:#d1242f;color:#fff;padding:13px 28px;text-decoration:none;border-radius:6px;font-weight:600;font-size:14px">View Failure Logs &amp; Artifacts</a>
                </div>
                <p style="color:#999;font-size:12px;text-align:center;margin-top:16px">Playwright HTML report attached as playwright-report.zip</p>
              </div>
              <div style="background:#f6f8fa;padding:16px;text-align:center;border-top:1px solid #e6e8eb">
                <p style="color:#999;font-size:12px;margin:0">GitHub Actions &#8226; ${{ github.repository }} &#8226; Run #${{ github.run_number }}</p>
              </div>
            </div>
            </body></html>

      # Explicitly fail job if tests failed (GitHub shows red X on PR/commit)
      - name: Fail job if tests failed
        if: steps.run_tests.outcome == 'failure'
        run: exit 1

