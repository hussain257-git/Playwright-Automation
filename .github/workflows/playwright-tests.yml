name: Playwright Tests CI/CD Pipeline

on:
  push:
    branches: [ main, develop, feature/* ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run tests daily at 02:00 UTC
    - cron: '0 2 * * *'

jobs:
  test:
    name: Run Playwright Tests
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test
        env:
          CI: true

      - name: Generate HTML report
        if: always()
        run: npx playwright show-report --host 0.0.0.0 --port 3000 &
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload test videos
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-videos
          path: test-results/
          retention-days: 7

      - name: Publish test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: test-results.json
          check_name: Playwright Test Results
          comment_title: Test Results

      - name: Generate test summary
        if: always()
        run: |
          echo "## Test Execution Summary" > $env:GITHUB_STEP_SUMMARY
          echo "" >> $env:GITHUB_STEP_SUMMARY
          echo "### Test Run Details" >> $env:GITHUB_STEP_SUMMARY
          echo "- **Date**: $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')" >> $env:GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $env:GITHUB_STEP_SUMMARY
          echo "- **Triggered By**: ${{ github.actor }}" >> $env:GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $env:GITHUB_STEP_SUMMARY
          echo "- **Test Status**: Check artifacts for detailed results" >> $env:GITHUB_STEP_SUMMARY

      - name: Parse test results
        if: always()
        id: test_summary
        run: |
          node scripts/generate-test-summary.js | Tee-Object -Variable test_summary
          echo "TEST_SUMMARY=$test_summary" >> $env:GITHUB_ENV

      - name: Display test metrics
        if: always()
        run: |
          if (Test-Path test-summary.json) {
            Get-Content test-summary.json
          } else {
            Write-Host "No test summary available"
          }

      - name: Send email notification on success
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.EMAIL_SERVER }}
          server_port: ${{ secrets.EMAIL_PORT }}
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "✅ Playwright Tests PASSED - Pipeline #${{ github.run_number }}"
          to: HussainBasha.Shaik257@outlook.com
          from: "GitHub Actions <playwright-tests@github.com>"
          attachments: playwright-report/
          body: |
            🎉 **Playwright Test Pipeline Execution Summary**

            **Status**: ✅ ALL TESTS PASSED

            **Pipeline Details:**
            - Repository: ${{ github.repository }}
            - Branch: ${{ github.ref_name }}
            - Triggered By: ${{ github.actor }}
            - Commit SHA: ${{ github.sha }}
            - Run ID: #${{ github.run_number }}
            - Triggered On: ${{ github.event_name }}
            - Timestamp: $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss UTC')

            **Test Execution Metrics:**
            - Total Test Cases: $(if (Test-Path test-summary.json) { (Get-Content test-summary.json | ConvertFrom-Json).totalTests } else { "N/A" })
            - ✅ Passed: $(if (Test-Path test-summary.json) { (Get-Content test-summary.json | ConvertFrom-Json).passed } else { "N/A" })
            - ❌ Failed: 0
            - ⏭️ Skipped: $(if (Test-Path test-summary.json) { (Get-Content test-summary.json | ConvertFrom-Json).skipped } else { "N/A" })
            - 🔨 Broken: 0
            - Pass Rate: $(if (Test-Path test-summary.json) { (Get-Content test-summary.json | ConvertFrom-Json).passRate }% else { "N/A" })
            - Total Duration: $(if (Test-Path test-summary.json) { (Get-Content test-summary.json | ConvertFrom-Json).totalDuration } else { "N/A" })s

            **Test Suites:**
            - Authentication Tests (6 cases): PASSED ✅
            - End-to-End Tests (3 cases): PASSED ✅
            - Framework Verification (2 cases): PASSED ✅

            **Artifacts Generated:**
            - ✓ Playwright Report (HTML)
            - ✓ Test Screenshots
            - ✓ Test Videos
            - ✓ Test Results JSON

            **Key Information:**
            - Test Framework: Playwright v1.44.0
            - Language: TypeScript v5.9.3
            - Browser: Chromium
            - Test Site: Sauce Demo (https://www.saucedemo.com)
            - OS: Windows Latest
            - Node.js: v18

            **Artifacts Retention:**
            - Playwright Report: 30 days
            - Test Videos: 7 days
            - Test Artifacts: 30 days

            **Next Steps:**
            1. Review detailed Playwright HTML Report (attached)
            2. Download artifacts from GitHub Actions
            3. Check pull request comments for inline results (if PR)
            4. All test logs available in Actions console

            ---
            **View Full Pipeline:** 
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            **Download Artifacts:**
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts

            Build Status: SUCCESS ✅
            Deployment Ready: YES 🚀

      - name: Send email notification on failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.EMAIL_SERVER }}
          server_port: ${{ secrets.EMAIL_PORT }}
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "❌ Playwright Tests FAILED - Pipeline #${{ github.run_number }}"
          to: HussainBasha.Shaik257@outlook.com
          from: "GitHub Actions <playwright-tests@github.com>"
          attachments: |
            playwright-report/
            test-results/
            test-summary.json
          body: |
            ⚠️ **Playwright Test Pipeline Execution Summary**

            **Status**: ❌ TESTS FAILED

            **Pipeline Details:**
            - Repository: ${{ github.repository }}
            - Branch: ${{ github.ref_name }}
            - Triggered By: ${{ github.actor }}
            - Commit SHA: ${{ github.sha }}
            - Run ID: #${{ github.run_number }}
            - Triggered On: ${{ github.event_name }}
            - Timestamp: $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss UTC')

            **Test Execution Metrics:**
            - Total Test Cases: $(if (Test-Path test-summary.json) { (Get-Content test-summary.json | ConvertFrom-Json).totalTests } else { "N/A" })
            - ✅ Passed: $(if (Test-Path test-summary.json) { (Get-Content test-summary.json | ConvertFrom-Json).passed } else { "N/A" })
            - ❌ Failed: $(if (Test-Path test-summary.json) { (Get-Content test-summary.json | ConvertFrom-Json).failed } else { "N/A" })
            - ⏭️ Skipped: $(if (Test-Path test-summary.json) { (Get-Content test-summary.json | ConvertFrom-Json).skipped } else { "N/A" })
            - 🔨 Broken: $(if (Test-Path test-summary.json) { (Get-Content test-summary.json | ConvertFrom-Json).broken } else { "N/A" })
            - Pass Rate: $(if (Test-Path test-summary.json) { (Get-Content test-summary.json | ConvertFrom-Json).passRate }% else { "N/A" })
            - Total Duration: $(if (Test-Path test-summary.json) { (Get-Content test-summary.json | ConvertFrom-Json).totalDuration } else { "N/A" })s

            **Failed Test Cases:**
            $(if (Test-Path test-summary.json) { $summary = Get-Content test-summary.json | ConvertFrom-Json; $summary.failedTests | ForEach-Object { "- ❌ $($_.suite): $($_.title)" } | Out-String } else { "Check test summary for details" })

            **What to Do:**
            1. ⚠️ Review the failed tests in the attached HTML report
            2. 📸 Check screenshots in test-results/ artifacts
            3. 🎥 Review video recordings for failed tests
            4. 📋 Read error messages in test-summary.json
            5. 🔍 Check the full logs in Actions console
            6. 🐛 Run tests locally to reproduce: npm test

            **Debugging Steps:**
            1. Run tests locally: npm test
            2. Run in debug mode: npx playwright test --debug
            3. Generate trace: npx playwright test --trace on
            4. View trace: npx playwright show-trace trace.zip

            **Key Information:**
            - Test Framework: Playwright v1.44.0
            - Language: TypeScript v5.9.3
            - Browser: Chromium
            - Test Site: Sauce Demo (https://www.saucedemo.com)
            - OS: Windows Latest
            - Node.js: v18

            **Artifacts Available:**
            - Playwright Report (HTML) - 30 days
            - Test Videos - 7 days
            - Test Screenshots - On failure
            - Test Summary (JSON) - For metrics

            **Quick Fixes to Try:**
            1. Update selectors if UI changed: npm run test:ui
            2. Clear cache: npm run clean
            3. Reinstall dependencies: npm ci
            4. Update Playwright: npm update @playwright/test

            ---
            **View Full Pipeline:** 
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            **Download Artifacts:**
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts

            **Test Report Link:**
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/attempts/1

            Build Status: FAILED ❌
            Action Required: YES ⚠️

            Please investigate and fix the failing tests.

