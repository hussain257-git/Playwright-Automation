name: Playwright Tests CI/CD Pipeline

on:
  push:
    branches: [ main, develop, feature/* ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run tests daily at 02:00 UTC
    - cron: '0 2 * * *'

jobs:
  test:
    name: Run Playwright Tests
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test
        env:
          CI: true

      - name: Generate HTML report
        if: always()
        run: npx playwright show-report --host 0.0.0.0 --port 3000 &
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload test videos
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-videos
          path: test-results/
          retention-days: 7

      - name: Publish test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: test-results.json
          check_name: Playwright Test Results
          comment_title: Test Results

      - name: Generate test summary
        if: always()
        run: |
          echo "## Test Execution Summary" > $env:GITHUB_STEP_SUMMARY
          echo "" >> $env:GITHUB_STEP_SUMMARY
          echo "### Test Run Details" >> $env:GITHUB_STEP_SUMMARY
          echo "- **Date**: $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')" >> $env:GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref }}" >> $env:GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $env:GITHUB_STEP_SUMMARY
          echo "- **Test Status**: Check artifacts for detailed results" >> $env:GITHUB_STEP_SUMMARY

      - name: Send email notification on success
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.EMAIL_SERVER }}
          server_port: ${{ secrets.EMAIL_PORT }}
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "✅ Playwright Tests PASSED - Pipeline #${{ github.run_number }}"
          to: HussainBasha.Shaik257@outlook.com
          from: "GitHub Actions <playwright-tests@github.com>"
          body: |
            🎉 **Playwright Test Pipeline Execution Summary**

            **Status**: ✅ ALL TESTS PASSED

            **Pipeline Details:**
            - Repository: ${{ github.repository }}
            - Branch: ${{ github.ref_name }}
            - Commit: ${{ github.sha }}
            - Author: ${{ github.actor }}
            - Run ID: #${{ github.run_number }}
            - Execution Time: ${{ job.status }}

            **Test Framework:**
            - Framework: Playwright 1.44.0
            - Language: TypeScript 5.9.3
            - Test Site: Sauce Demo (https://www.saucedemo.com)

            **Test Suites:**
            - Authentication Tests (6 tests)
            - End-to-End Tests (3 tests)
            - Framework Verification (2 tests)

            **Artifacts:**
            - Test Report: Available in Actions artifacts
            - Screenshots: On failure only
            - Videos: On failure only

            **Next Steps:**
            1. Review test results in GitHub Actions
            2. Download artifacts for detailed analysis
            3. Check pull request comments for inline results

            ---
            Build triggered by: ${{ github.event_name }}
            View full pipeline: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Send email notification on failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.EMAIL_SERVER }}
          server_port: ${{ secrets.EMAIL_PORT }}
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "❌ Playwright Tests FAILED - Pipeline #${{ github.run_number }}"
          to: HussainBasha.Shaik257@outlook.com
          from: "GitHub Actions <playwright-tests@github.com>"
          body: |
            ⚠️ **Playwright Test Pipeline Execution Summary**

            **Status**: ❌ TESTS FAILED

            **Pipeline Details:**
            - Repository: ${{ github.repository }}
            - Branch: ${{ github.ref_name }}
            - Commit: ${{ github.sha }}
            - Author: ${{ github.actor }}
            - Run ID: #${{ github.run_number }}

            **What to Do:**
            1. Check the failed tests in GitHub Actions
            2. Review screenshots and videos in artifacts
            3. Check error messages in the test report
            4. Download full logs from the run

            **Debugging Steps:**
            - Run tests locally: npm test
            - Run in debug mode: npx playwright test --debug
            - Generate trace: npx playwright test --trace on
            - View trace: npx playwright show-trace trace.zip

            ---
            View full pipeline: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Artifacts available for 7 days

